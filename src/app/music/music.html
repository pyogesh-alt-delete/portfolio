<section id="music">
  <audio #audioPlayer (ended)="onAudioEnded()"></audio>

  <div class="sec-head" appScrollReveal>
    <span class="sec-num">06</span>
    <span class="sec-title">Music</span>
    <span class="sec-rule"></span>
  </div>

  <div class="music-grid">
    @for (m of data.music; track m.title; let i = $index) {
      <div class="track" appScrollReveal [revealDelay]="i * 35"
           [class.playing]="playingIndex === i"
           (click)="togglePlay(i)">
        <div class="track-top">
          <div class="cover" [style]="'--h:' + m.color">
            <span class="play">
              @if (playingIndex === i) {
                <svg viewBox="0 0 24 24" fill="#fff" width="18" height="18">
                  <rect x="6" y="5" width="4" height="14"/>
                  <rect x="14" y="5" width="4" height="14"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="#fff" width="18" height="18">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              }
            </span>
          </div>
          <div>
            <div class="t-title">{{ m.title }}</div>
            <div class="t-kind">{{ m.kind }} · {{ m.year }}</div>
          </div>
        </div>
        <div class="t-foot">
          <div class="waveform">
            @for (b of getBars(i); track $index; let j = $index) {
              <i [style.height]="b + '%'"
                 [style.animation-delay]="(j * 50) + 'ms'"></i>
            }
          </div>
          <span class="t-len">{{ m.len }}</span>
        </div>
      </div>
    }
  </div>
</section>
